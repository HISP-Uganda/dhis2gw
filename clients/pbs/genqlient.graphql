# internal/clients/pbs/queries.graphql

mutation Login($user: String!, $pass: String!, $ip: String!) {
  login(data: { User_Name: $user, Password: $pass, ipAddress: $ip }) {
    access_token
    refresh_token
    user {
      User_ID
      User_Name
      First_Name
      Last_Name
      Email
    }
  }
}

mutation Refresh($at: String!, $rt: String!) {
  refreshToken(data: { access_token: $at, refresh_token: $rt }) {
    access_token
    refresh_token
  }
}

query LgIFMSVotes {
  lgIFMSVotes {
    Vote_ID
    Vote_Code
    Vote_Name
    Created_Date
  }
}

query LgIFMSBudgetOutputs {
  lgIFMSBudgetOutputs {
